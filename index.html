<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具启动教程</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold2:#E8C97A;--gold3:#F5E4A0;--gdim:#7A5F28;--bg:#06060D;--bg2:#0C0C18;--bg3:#111122;--glass:rgba(255,255,255,.04);--glass2:rgba(255,255,255,.07);--bord:rgba(201,168,76,.14);--bord2:rgba(201,168,76,.38);--tx:#F2EADA;--mut:#9A8B78;--dim:#4A4035;--rlg:20px;--rxl:28px}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden}
.cursor{width:10px;height:10px;border-radius:50%;background:var(--gold);position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .18s,height .18s;mix-blend-mode:difference}
.cursor.big{width:36px;height:36px;opacity:.4}
#bgc{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── HERO ── */
.hero{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;padding:0 2rem}
.orb{position:absolute;border-radius:50%;pointer-events:none}
.o1{width:700px;height:700px;background:radial-gradient(circle,rgba(201,168,76,.1) 0%,transparent 65%);top:5%;left:15%;animation:ob 9s ease-in-out infinite}
.o2{width:500px;height:500px;background:radial-gradient(circle,rgba(47,171,128,.07) 0%,transparent 65%);bottom:5%;right:10%;animation:ob 12s ease-in-out infinite;animation-delay:-4s}
.o3{width:350px;height:350px;background:radial-gradient(circle,rgba(130,80,200,.06) 0%,transparent 65%);top:40%;left:2%;animation:ob 15s ease-in-out infinite;animation-delay:-8s}
@keyframes ob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-50px) scale(1.06)}}
.hbadge{font-family:'Cinzel',serif;font-size:11px;letter-spacing:6px;color:var(--gold);border:1px solid var(--bord2);padding:8px 24px;border-radius:40px;margin-bottom:2.5rem;backdrop-filter:blur(12px);background:rgba(201,168,76,.05);animation:up .9s ease .2s both}
.htitle{font-family:'Noto Serif SC',serif;font-size:clamp(2.8rem,6vw,5.5rem);font-weight:700;line-height:1.1;margin-bottom:.5rem;animation:up .9s ease .4s both}
.htitle span{background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gdim));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hsub{font-family:'Cinzel',serif;font-size:clamp(.85rem,1.8vw,1.2rem);letter-spacing:4px;color:var(--mut);margin-bottom:2.5rem;animation:up .9s ease .6s both}
.hstats{display:flex;gap:2.5rem;justify-content:center;margin-bottom:3rem;animation:up .9s ease .8s both}
.stat .sn{font-family:'Cinzel',serif;font-size:1.9rem;color:var(--gold);font-weight:600}
.stat .sl{font-size:10px;letter-spacing:2px;color:var(--mut);margin-top:2px}
.hcta{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center;animation:up .9s ease 1s both}
.btn{padding:11px 24px;border-radius:50px;font-size:12.5px;letter-spacing:.8px;cursor:pointer;transition:all .3s;font-family:'Noto Sans SC',sans-serif;display:inline-flex;align-items:center;gap:7px;font-weight:500;text-decoration:none;border:none;white-space:nowrap}
.bp{background:linear-gradient(135deg,var(--gold),var(--gdim));color:#08050A;box-shadow:0 6px 28px rgba(201,168,76,.22)}
.bp:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(201,168,76,.4)}
.bg{background:var(--glass);border:1px solid var(--bord2);color:var(--gold);backdrop-filter:blur(10px)}
.bg:hover{background:rgba(201,168,76,.1);transform:translateY(-2px)}
.bsm{padding:8px 16px;font-size:11.5px}
.scue{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--mut);font-size:10px;letter-spacing:3px;animation:up .9s ease 1.4s both}
.scue::after{content:'';width:1px;height:44px;background:linear-gradient(var(--gold),transparent);margin-top:4px;animation:lp 2s ease infinite}
@keyframes lp{0%,100%{opacity:.2;transform:scaleY(.5)}50%{opacity:1;transform:scaleY(1)}}
@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}

/* ── LANG BAR ── */
.lbar{position:fixed;top:1rem;right:1.5rem;z-index:400;display:flex;gap:.35rem;background:rgba(6,6,13,.85);backdrop-filter:blur(20px);border:1px solid var(--bord);border-radius:50px;padding:5px}
.lbtn{padding:5px 14px;border-radius:50px;font-size:11px;letter-spacing:.5px;cursor:pointer;transition:all .25s;color:var(--mut);background:none;border:none;font-family:'Noto Sans SC',sans-serif}
.lbtn:hover{color:var(--tx)}
.lbtn.on{background:rgba(201,168,76,.18);color:var(--gold);border:1px solid var(--bord2)}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:200;padding:0 1.5rem}
.nav-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:.8rem;padding:.7rem 1.4rem;background:rgba(6,6,13,.9);backdrop-filter:blur(24px);border:1px solid var(--bord);border-radius:var(--rxl);margin-top:.7rem}
.nlogo{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:2px;flex-shrink:0}
.npills{display:flex;gap:.3rem;overflow-x:auto;scrollbar-width:none;flex:1;padding:0 .3rem}
.npills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:6px 14px;border-radius:50px;font-size:11.5px;cursor:pointer;transition:all .25s;white-space:nowrap;border:1px solid transparent;color:var(--mut);background:none;font-family:'Noto Sans SC',sans-serif}
.pill:hover{color:var(--tx);border-color:var(--bord)}
.pill.on{background:linear-gradient(135deg,rgba(201,168,76,.22),rgba(201,168,76,.07));border-color:var(--bord2);color:var(--gold)}
.nacts{display:flex;gap:.4rem;flex-shrink:0}

/* ── MAIN ── */
.main{position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:3rem 1.5rem 6rem}
.fbar{display:flex;align-items:center;gap:.8rem;margin-bottom:3rem;flex-wrap:wrap}
.sbox{flex:1;min-width:220px;position:relative}
.sbox input{width:100%;padding:11px 18px 11px 44px;background:var(--glass2);border:1px solid var(--bord);border-radius:50px;color:var(--tx);font-size:12.5px;font-family:'Noto Sans SC',sans-serif;outline:none;transition:all .3s;backdrop-filter:blur(10px)}
.sbox input::placeholder{color:var(--dim)}
.sbox input:focus{border-color:var(--bord2);background:rgba(201,168,76,.05)}
.sico{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:14px;pointer-events:none}
.vbtns{display:flex;background:var(--glass);border:1px solid var(--bord);border-radius:10px;overflow:hidden}
.vb{padding:8px 13px;cursor:pointer;transition:all .25s;color:var(--mut);font-size:14px;border:none;background:none}
.vb.on{background:rgba(201,168,76,.15);color:var(--gold)}
.sec{margin-bottom:4.5rem}
.sh{display:flex;align-items:center;gap:1.2rem;margin-bottom:2rem;opacity:0;transform:translateY(18px);transition:all .7s}
.sh.vis{opacity:1;transform:none}
.sacc{width:4px;height:44px;border-radius:4px;background:linear-gradient(var(--gold),var(--gdim));flex-shrink:0}
.st h2{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:var(--gold);margin-bottom:3px}
.st h3{font-size:1.4rem;font-weight:400;color:var(--tx)}
.sc{margin-left:auto;font-size:11px;color:var(--mut);background:var(--glass);border:1px solid var(--bord);padding:4px 11px;border-radius:20px;white-space:nowrap}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.4rem}
.cgrid.lv{grid-template-columns:1fr}
.gl{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:3rem 0;opacity:.3}

/* ── CARD ── */
.card{background:var(--bg3);border:1px solid var(--bord);border-radius:var(--rlg);overflow:hidden;transition:all .4s cubic-bezier(.23,1,.32,1);opacity:0;transform:translateY(28px) scale(.985);cursor:pointer;position:relative}
.card.vis{opacity:1;transform:none}
.card:hover{border-color:var(--bord2);transform:translateY(-8px) scale(1.008);box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 0 1px rgba(201,168,76,.12),inset 0 1px 0 rgba(255,255,255,.04)}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.05),transparent 55%);opacity:0;transition:opacity .4s;pointer-events:none;z-index:1}
.card:hover::before{opacity:1}

/* CARD IMAGE — white bg removal via mix-blend-mode */
.cimg{height:180px;position:relative;overflow:hidden;background:linear-gradient(135deg,#0A0A18,#111125)}
.cimg-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.cimg-inner img{max-width:85%;max-height:85%;object-fit:contain;transition:transform .65s cubic-bezier(.23,1,.32,1);mix-blend-mode:multiply;filter:drop-shadow(0 4px 16px rgba(201,168,76,.3));display:block}
.card:hover .cimg-inner img{transform:scale(1.1) rotate(1deg)}
.cph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;opacity:.3}
.cov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(6,6,13,.9));z-index:1;pointer-events:none}
.cbadge{position:absolute;top:11px;right:11px;z-index:2;font-size:9.5px;letter-spacing:.8px;padding:3px 9px;border-radius:20px;backdrop-filter:blur(8px)}
.bb{background:rgba(47,171,128,.2);border:1px solid rgba(47,171,128,.4);color:#5DCCA8}
.bw{background:rgba(58,127,191,.2);border:1px solid rgba(58,127,191,.4);color:#7EB8EF}
.bpp{background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);color:var(--gold2)}
.bj{background:rgba(200,80,130,.2);border:1px solid rgba(200,80,130,.4);color:#EF8EB8}
.br{background:rgba(200,80,80,.2);border:1px solid rgba(200,80,80,.4);color:#EF8E8E}
.bs{background:rgba(130,80,200,.2);border:1px solid rgba(130,80,200,.4);color:#C08EEF}
.ctit{position:absolute;bottom:10px;left:12px;z-index:2}
.ctit .cn{font-family:'Noto Serif SC',serif;font-size:1rem;font-weight:600;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.9)}
.ctit .ce{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.8px;color:rgba(255,255,255,.5);margin-top:1px}

/* CARD BODY */
.cbody{padding:1.1rem;position:relative;z-index:2}
.cinfo{display:flex;flex-direction:column;gap:5px;margin-bottom:.9rem}
.crow{display:flex;align-items:baseline;gap:7px;padding:5px 9px;background:var(--glass);border:1px solid var(--bord);border-radius:8px;min-height:28px}
.crow-lbl{font-size:9.5px;letter-spacing:1.2px;color:var(--gold);flex-shrink:0;font-weight:600;min-width:52px}
.crow-val{font-size:11.5px;color:var(--mut);line-height:1.5;flex:1}
.csum{font-size:11.5px;color:var(--mut);line-height:1.65;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cacts{display:flex;gap:.45rem;flex-wrap:wrap}
.ab{flex:1;min-width:70px;padding:8px 10px;border-radius:9px;font-size:11px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:4px;font-weight:500;border:none}
.a1{background:linear-gradient(135deg,rgba(201,168,76,.22),rgba(201,168,76,.07));border:1px solid var(--bord2);color:var(--gold)}
.a1:hover{background:linear-gradient(135deg,rgba(201,168,76,.4),rgba(201,168,76,.18));transform:scale(1.02)}
.a2{background:var(--glass);border:1px solid var(--bord);color:var(--mut)}
.a2:hover{border-color:var(--bord2);color:var(--tx)}
.aic{width:32px;height:32px;min-width:32px;padding:0;border-radius:8px;font-size:13px;flex:none}
/* List view */
.cgrid.lv .card{display:flex;flex-direction:row}
.cgrid.lv .cimg{width:180px;height:auto;min-height:130px;flex-shrink:0}
.cgrid.lv .cbody{flex:1}

/* ── MODAL ── */
.mbg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.9);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;padding:1.2rem}
.mbg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bord);border-radius:var(--rxl);max-width:700px;width:100%;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;animation:popIn .38s cubic-bezier(.23,1,.32,1)}
@keyframes popIn{from{opacity:0;transform:scale(.88) translateY(24px)}to{opacity:1;transform:none}}
.mimg-wrap{height:220px;position:relative;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,#0A0A18,#111125)}
.mimg-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:transform .5s}
.mimg-inner:hover{transform:scale(1.04)}
.mimg-inner img{max-width:70%;max-height:85%;object-fit:contain;mix-blend-mode:multiply;filter:drop-shadow(0 6px 20px rgba(201,168,76,.35));display:block}
.mph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem;opacity:.6}
.movl{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,var(--bg2));pointer-events:none}
.mcl{position:absolute;top:13px;right:13px;z-index:3;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;backdrop-filter:blur(8px)}
.mcl:hover{background:rgba(192,50,50,.65)}
.mhead{padding:1.2rem 1.6rem .7rem;position:relative;margin-top:-1.8rem;z-index:2}
.mbadge{display:inline-flex;align-items:center;font-size:9.5px;letter-spacing:1.5px;padding:3px 11px;border-radius:20px;margin-bottom:.5rem}
.mname{font-family:'Noto Serif SC',serif;font-size:1.7rem;font-weight:700;color:var(--tx);line-height:1.2;margin-bottom:2px}
.mename{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:2px;color:var(--gold)}
.mqk{display:flex;gap:.45rem;flex-wrap:wrap;padding:.3rem 1.6rem .6rem}
.qch{display:flex;align-items:center;gap:5px;font-size:11.5px;padding:6px 12px;background:var(--glass2);border:1px solid var(--bord);border-radius:20px;color:var(--mut)}
.qch .qi{font-size:14px;flex-shrink:0}
.minfo{display:flex;flex-direction:column;gap:5px;padding:0 1.6rem .7rem}
.mrow{display:flex;align-items:baseline;gap:8px;padding:7px 11px;background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.12);border-radius:10px}
.ml{font-size:9.5px;letter-spacing:1.2px;color:var(--gold);flex-shrink:0;font-weight:600;min-width:65px}
.mv{font-size:13px;color:var(--tx);line-height:1.55;flex:1}
.msc{flex:1;overflow-y:auto;padding:0 1.6rem 1.6rem;scrollbar-width:thin;scrollbar-color:var(--bord) transparent}
.msc::-webkit-scrollbar{width:3px}.msc::-webkit-scrollbar-thumb{background:var(--bord);border-radius:2px}
.msec{margin-bottom:1.4rem}
.mst{font-size:9.5px;letter-spacing:2.5px;color:var(--gold);margin-bottom:.7rem;padding-bottom:5px;border-bottom:1px solid rgba(201,168,76,.11)}
.mstep{display:flex;gap:.9rem;margin-bottom:.75rem}
.mnum{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(201,168,76,.04));border:1px solid var(--bord2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gold);flex-shrink:0;font-weight:600;font-family:'Cinzel',serif}
.mbod{padding-top:2px;flex:1}
.me{font-size:12.5px;color:var(--tx);line-height:1.7;margin-bottom:2px}
.mz{font-size:11.5px;color:var(--mut);line-height:1.7}
.mbox{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.11);border-radius:11px;padding:10px 12px;margin:.5rem 0;font-size:12.5px;line-height:1.75}
.mbl{font-size:9.5px;letter-spacing:1.5px;color:var(--gold);margin-bottom:4px}
.mbe{color:var(--tx)}.mbz{color:var(--mut);font-size:11.5px;margin-top:2px}
.mattn{background:rgba(192,50,50,.07);border:1px solid rgba(192,50,50,.2);border-radius:11px;padding:10px 12px;margin:.7rem 0;font-size:11.5px;line-height:1.75;color:#EF9A9A}
.mattn strong{display:block;font-size:9.5px;letter-spacing:1.5px;margin-bottom:4px;color:#EF6060}
.colg{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px}
.colr{background:rgba(255,255,255,.03);border-radius:7px;padding:5px 9px;font-size:10.5px;line-height:1.5}
.coln{color:var(--gold);font-weight:600;font-size:9.5px}
.mft{padding:.9rem 1.6rem 1.4rem;border-top:1px solid var(--bord);display:flex;gap:.6rem;flex-wrap:wrap;flex-shrink:0}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(201,168,76,.13);border:1px solid var(--bord2);backdrop-filter:blur(20px);color:var(--gold2);padding:9px 18px;border-radius:50px;font-size:12.5px;z-index:999;opacity:0;transition:all .38s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
footer{position:relative;z-index:2;text-align:center;padding:3rem 2rem;border-top:1px solid var(--bord)}
.flo{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);letter-spacing:3px;margin-bottom:.4rem}
footer p{font-size:11px;color:var(--dim);letter-spacing:2px}
@media(max-width:680px){.cgrid{grid-template-columns:1fr}.hstats{gap:1.4rem}.nav-in{border-radius:16px}.cgrid.lv .card{flex-direction:column}.cgrid.lv .cimg{width:100%;height:170px}.lbar{top:.6rem;right:.8rem}}
</style>
</head>
<body>
<div class="cursor" id="cur"></div>
<canvas id="bgc"></canvas>
<div class="toast" id="toast"></div>

<!-- LANG -->
<div class="lbar">
  <button class="lbtn" onclick="setLang('en')">EN</button>
  <button class="lbtn on" onclick="setLang('zh')">简体</button>
  <button class="lbtn" onclick="setLang('tw')">繁體</button>
</div>

<!-- HERO -->
<section class="hero">
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
  <div class="hbadge" id="h-badge">✦ TOOL ACTIVATION GUIDE · 工具启动教程 ✦</div>
  <h1 class="htitle"><span id="h-title">工具启动教程</span></h1>
  <p class="hsub" id="h-sub">Sacred Activation Rituals · 五福临门</p>
  <div class="hstats">
    <div class="stat"><div class="sn">50+</div><div class="sl" id="h-s1">TOOLS</div></div>
    <div class="stat"><div class="sn">7</div><div class="sl" id="h-s2">CATEGORIES</div></div>
    <div class="stat"><div class="sn">3</div><div class="sl" id="h-s3">LANGUAGES</div></div>
  </div>
  <div class="hcta">
    <button class="btn bp" onclick="document.querySelector('.main').scrollIntoView({behavior:'smooth'})">✦ <span id="h-exp">开始浏览</span></button>
    <button class="btn bg" onclick="openSearch()">🔍 <span id="h-srch">搜索</span></button>
    <button class="btn bg bsm" onclick="toggleView()">⊞ <span id="h-vw">视图</span></button>
  </div>
  <div class="scue" id="h-scr">SCROLL</div>
</section>

<!-- NAV -->
<div class="nav">
  <div class="nav-in">
    <div class="nlogo" id="n-logo">✦ 启动</div>
    <div class="npills" id="npills">
      <button class="pill on" onclick="filterCat('all',this)" id="p-all">全部</button>
      <button class="pill" onclick="filterCat('special',this)" id="p-special">📜 名正言顺</button>
      <button class="pill" onclick="filterCat('board',this)" id="p-board">🏮 风水牌</button>
      <button class="pill" onclick="filterCat('watch',this)" id="p-watch">⌚ 手表</button>
      <button class="pill" onclick="filterCat('pendant',this)" id="p-pendant">💎 吊坠</button>
      <button class="pill" onclick="filterCat('jewelry',this)" id="p-jewelry">📿 手链耳环</button>
      <button class="pill" onclick="filterCat('ring',this)" id="p-ring">💍 戒指</button>
    </div>
    <div class="nacts">
      <button class="btn bg bsm" onclick="openSearch()">🔍</button>
      <button class="btn bg bsm" onclick="toggleView()">⊞</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<main class="main">
  <div class="fbar">

function openModal(id){

  const src=document.getElementById('img-'+id)?.src;
  const mi=document.getElementById('mimg'),mph=document.getElementById('mph'),inn=document.getElementById('minner');

  }else{mi.style.display='none';mph.style.display='flex';mph.textContent=t.icon;}
  document.getElementById('mb1').className=`cbadge ${t.bc}`;document.getElementById('mb1').textContent=t.cat.toUpperCase();
  document.getElementById('mb2').style.cssText=MBS[t.cat]||'';document.getElementById('mb2').textContent=t.cat.toUpperCase();

  document.getElementById('mqk')?null:null;

  document.getElementById('minfo').innerHTML=`
    <div class="mrow"><span class="ml">${tl.lbl_time}</span><span class="mv">${ttime}</span></div>
    <div class="mrow"><span class="ml">${tl.lbl_mat}</span><span class="mv">${tmat}</span></div>
    <div class="mrow"><span class="ml">${tl.lbl_place}</span><span class="mv">${tplace}</span></div>`;

function shareCard(e,id){if(e)e.stopPropagation();const t=TOOLS.find(x=>x.id===id);if(t)showToast(`↗ ${(t.langs[L]||t.langs.zh).name}`);}

// IMMERSIVE BACKGROUND — Stars, Meteors, Aurora, Particles
// ═══════════════════════════════════════════════════════
(function(){
  const c=document.getElementById('bgc'),ctx=c.getContext('2d');
  let W,H,stars=[],meteors=[],particles=[],mx=W/2||400,my=H/2||300;

  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}

  // STARS (static twinkling)
  class Star{
    constructor(){this.reset();}
    reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.5+.3;this.base=Math.random()*.6+.05;this.ph=Math.random()*Math.PI*2;this.sp=Math.random()*.015+.004;this.color=Math.random()<.15?`rgba(200,220,255,`:`rgba(255,245,220,`;}
    draw(t){const a=this.base*(.5+.5*Math.sin(this.ph+t*this.sp*60));ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=this.color+a+')';ctx.fill();}
  }

  // STAR SPARKLE (4-pointed star)
  class Sparkle{
    constructor(){this.reset();}
    reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.size=Math.random()*3+1;this.life=0;this.maxLife=60+Math.random()*80;this.ph=Math.random()*Math.PI*2;}
    draw(){const prog=this.life/this.maxLife;const a=prog<.5?prog*2:2-prog*2;const s=this.size*a;ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.ph);ctx.fillStyle=`rgba(255,240,180,${a*.8})`;ctx.beginPath();ctx.moveTo(0,-s*2.5);ctx.lineTo(s*.4,-s*.4);ctx.lineTo(s*2.5,0);ctx.lineTo(s*.4,s*.4);ctx.lineTo(0,s*2.5);ctx.lineTo(-s*.4,s*.4);ctx.lineTo(-s*2.5,0);ctx.lineTo(-s*.4,-s*.4);ctx.closePath();ctx.fill();ctx.restore();this.life++;return this.life<this.maxLife;}
  }

  // METEORS / SHOOTING STARS
  class Meteor{
    constructor(){this.reset();}
    reset(){
      this.x=Math.random()*W*1.5;this.y=-50;
      this.len=Math.random()*150+80;this.speed=Math.random()*8+6;
      this.angle=Math.PI/4+Math.random()*.3;
      this.vx=Math.cos(this.angle)*this.speed;this.vy=Math.sin(this.angle)*this.speed;
      this.life=0;this.maxLife=Math.floor(this.len/this.speed)+20;
      this.bright=Math.random()*.8+.2;this.trail=[];
    }
    update(){
      this.trail.unshift({x:this.x,y:this.y});
      if(this.trail.length>Math.floor(this.len/this.speed))this.trail.pop();
      this.x+=this.vx;this.y+=this.vy;this.life++;
    }
    draw(){
      if(!this.trail.length)return;
      const grad=ctx.createLinearGradient(this.x,this.y,this.trail[this.trail.length-1].x,this.trail[this.trail.length-1].y);
      grad.addColorStop(0,`rgba(255,250,230,${this.bright})`);
      grad.addColorStop(.3,`rgba(201,168,76,${this.bright*.6})`);
      grad.addColorStop(1,'rgba(201,168,76,0)');
      ctx.strokeStyle=grad;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(this.x,this.y);
      this.trail.forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();
      // head glow
      ctx.beginPath();ctx.arc(this.x,this.y,2.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,250,230,${this.bright})`;ctx.fill();
    }
    isDead(){return this.y>H+50||this.x>W+50||this.life>this.maxLife+30;}
  }

  // FLOATING PARTICLES (mouse-attracted)
  class Particle{
    constructor(){this.reset();}
    reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.25;this.vy=(Math.random()-.15)*.15;this.r=Math.random()*1.2+.3;this.o=Math.random()*.45+.07;this.ph=Math.random()*Math.PI*2;this.sp=Math.random()*.02+.005;}
    update(){
      const dx=mx-this.x,dy=my-this.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<200&&dist>0){this.vx+=dx/dist*.006;this.vy+=dy/dist*.006;}
      this.vx*=.99;this.vy*=.99;
      this.x+=this.vx;this.y+=this.vy;this.ph+=this.sp;
      if(this.x<-5||this.x>W+5||this.y<-5||this.y>H+5)this.reset();
    }
    draw(t){const a=this.o*(.4+.6*Math.sin(this.ph));ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,240,200,${a})`;ctx.fill();}
  }

  function init(){
    resize();
    stars=Array.from({length:250},()=>new Star());
    particles=Array.from({length:180},()=>new Particle());
    meteors=[];
  }

  const sparkles=[];
  let sparkleTimer=0;
  let meteorTimer=0;
  let t=0;

  function loop(){
    ctx.clearRect(0,0,W,H);
    t++;

    // Aurora waves
    for(let i=0;i<4;i++){
      const waveY=H*.35+Math.sin(t*.002+i*1.4)*H*.12;
      const g=ctx.createLinearGradient(0,waveY-120,0,waveY+120);
      const cols=['rgba(201,168,76','rgba(47,171,128','rgba(130,80,200','rgba(58,127,191'];
      g.addColorStop(0,'rgba(0,0,0,0)');
      g.addColorStop(.4,cols[i%4]+`,.018)`);
      g.addColorStop(.6,cols[i%4]+`,.012)`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.moveTo(0,0);
      for(let x=0;x<=W;x+=30){
        const y=waveY+Math.sin((x/W)*Math.PI*4+t*.003+i*2)*60+Math.cos((x/W)*Math.PI*2.5+t*.002)*40;
        x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
    }

    // Stars
    stars.forEach(s=>s.draw(t));

    // Sparkles
    sparkleTimer++;
    if(sparkleTimer>40){sparkleTimer=0;if(sparkles.length<15)sparkles.push(new Sparkle());}
    for(let i=sparkles.length-1;i>=0;i--){if(!sparkles[i].draw())sparkles.splice(i,1);}

    // Meteors
    meteorTimer++;
    if(meteorTimer>180+Math.random()*300){meteorTimer=0;meteors.push(new Meteor());}
    for(let i=meteors.length-1;i>=0;i--){meteors[i].update();meteors[i].draw();if(meteors[i].isDead())meteors.splice(i,1);}

    // Particle connections
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<70){ctx.strokeStyle=`rgba(201,168,76,${.04*(1-d/70)})`;ctx.lineWidth=.4;ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();}
      }
    }
    particles.forEach(p=>{p.update();p.draw(t);});

    requestAnimationFrame(loop);
  }

  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  window.addEventListener('resize',init);
  init();loop();

  // Orb parallax
  window.addEventListener('scroll',()=>{
    const y=window.scrollY;
    document.querySelector('.o1').style.transform=`translateY(${y*.25}px)`;
    document.querySelector('.o2').style.transform=`translateY(${-y*.18}px)`;
    document.querySelector('.o3').style.transform=`translateY(${y*.12}px)`;
  });
})();
</script>
</body>
